<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #6dc5bb;
  --teal-d: #4aada2;
  --ink: #222;
  --sub: #777;
  --line: #e8e8e8;
  --bg: #f2f4f3;
}

body {
  font-family: -apple-system, "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
}

/* ── layout ── */
.wrap { display: flex; height: 100vh; overflow: hidden; }

/* ── sidebar ── */
.side {
  width: 300px; flex-shrink: 0;
  background: #fff; border-right: 1px solid var(--line);
  display: flex; flex-direction: column; overflow: hidden;
}
.side-top {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--line);
}
.side-top h1 { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }

.btn-pdf {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  width: 100%; padding: 9px; border: none; border-radius: 8px;
  background: var(--teal); color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.btn-pdf:hover { background: var(--teal-d); }

.btn-compact {
  display: flex; align-items: center; justify-content: center;
  width: 100%; margin-top: 7px; padding: 8px;
  border: 1.5px solid var(--line); border-radius: 8px;
  background: #fff; color: var(--muted);
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.btn-compact:hover { border-color: var(--teal); color: var(--teal-d); }
.btn-compact.on { background: var(--teal-light, #e8f7f6); border-color: var(--teal); color: var(--teal-d); }

/* 緊湊模式 */
.doc.compact .d-top { padding: 28px 100px 6px; }
.doc.compact .d-title-row { padding: 8px 100px 0; }
.doc.compact .d-meta-row { padding: 6px 100px 10px; }
.doc.compact .d-tbl td { padding: 7px 12px; }
.doc.compact .d-total { padding: 4px 100px 0; }
.doc.compact .d-terms { margin: 32px 100px; padding: 10px 18px; }
.doc.compact .d-sig { padding: 0 100px 24px; }
.doc.compact .sig-labels { margin-bottom: 36px; }

.side-body { flex: 1; overflow-y: auto; padding: 14px 18px 28px; }
.side-body::-webkit-scrollbar { width: 3px; }
.side-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.sec {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--teal-d);
  margin: 16px 0 8px; padding-bottom: 5px;
  border-bottom: 1px solid var(--line);
}
.sec:first-child { margin-top: 0; }

.f { margin-bottom: 7px; }
.f label { display: block; font-size: 11px; color: var(--sub); margin-bottom: 3px; }

input[type=text], input[type=date], select, textarea {
  width: 100%; padding: 7px 9px;
  border: 1px solid var(--line); border-radius: 6px;
  font: inherit; font-size: 13px; color: var(--ink); background: #fff;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(109,197,187,.12);
}
textarea { resize: vertical; min-height: 78px; line-height: 1.6; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

/* item rows */
.itbl { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
.itbl th {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: #bbb;
  padding: 4px 3px 4px; border-bottom: 1px solid var(--line); text-align: left;
}
.itbl td { padding: 2px 2px; vertical-align: middle; }
.itbl input {
  padding: 5px 6px; background: #f7f7f7;
  border: 1px solid transparent; border-radius: 4px;
  font-size: 12px; width: 100%; font-family: inherit;
}
.itbl input:focus { background: #fff; border-color: var(--teal); outline: none; }
.itbl .c-d { width: 44%; }
.itbl .c-p { width: 23%; }
.itbl .c-q { width: 19%; }
.itbl .c-x { width: 14%; text-align: right; }
.x-btn {
  background: none; border: none; color: #d0d0d0;
  cursor: pointer; font-size: 16px; padding: 2px 6px;
  border-radius: 4px; transition: color .15s;
}
.x-btn:hover { color: #e44; }
.add-btn {
  width: 100%; padding: 7px; border: 1.5px dashed #ddd;
  border-radius: 6px; background: none; font: inherit; font-size: 12px;
  color: #bbb; cursor: pointer; transition: all .15s;
}
.add-btn:hover { border-color: var(--teal); color: var(--teal-d); background: #f0faf9; }

/* ── stage ── */
.stage {
  flex: 1; overflow-y: auto; padding: 28px 28px;
  display: flex; justify-content: center; align-items: flex-start;
  background: #e0e2e1;
}
.stage::-webkit-scrollbar { width: 5px; }
.stage::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }

/* ── document — fixed A4 size ── */
.doc {
  width: 794px; min-height: 1123px; flex-shrink: 0;
  background: #fff;
  box-shadow: 0 2px 20px rgba(0,0,0,.18);
}

/* header — top row: logo right */
.d-top {
  padding: 56px 100px 20px;
  display: flex; justify-content: flex-end;
}
.d-logo-block { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0; }
.d-logo { height: 70px; width: auto; display: block; margin-bottom: 2px; }
.d-co-name {
  font-size: 15px; font-weight: 700; color: var(--ink);
  text-align: right; line-height: 1;
}

/* title row */
.d-title-row { padding: 14px 100px 0; }
.d-word { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.2px; }

/* client + no/date row */
.d-meta-row {
  padding: 12px 100px 18px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
}
.d-cname { font-size: 13px; font-weight: 400; color: var(--ink); }
.d-cinfo { font-size: 12px; color: var(--ink); margin-top: 1px; line-height: 1.8; }
.d-nodate { text-align: right; font-size: 12px; color: var(--ink); line-height: 2; white-space: nowrap; }
.d-nodate .lbl { color: var(--sub); }

/* separator */
.d-sep { height: 1px; background: #bbb; margin: 0 100px; }

/* table */
.d-tbl-wrap { padding: 20px 100px 0; }
.d-tbl { width: 100%; border-collapse: collapse; }
.d-tbl thead tr {
  background: #8a8a8a;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.d-tbl th {
  padding: 6px 12px; font-size: 11px; font-weight: 500;
  color: #fff; text-align: center;
}
.d-tbl th:first-child { text-align: center; }
.d-tbl td {
  padding: 14px 12px; font-size: 11px; color: #333;
  border-bottom: 1px solid #e8e8e8; line-height: 1.4;
  text-align: center;
}
.d-tbl td:first-child { text-align: left; }
.d-tbl .bold { font-weight: 700; color: var(--ink); text-align: center; }
.d-tbl tr:last-child td { border-bottom: none; }
.d-tbl .bold { font-weight: 700; color: var(--ink); }

/* total — 欄位對齊表格（同 12px cell padding）*/
.d-total { padding: 0 100px; }
.total-inner {
  display: table; width: 100%;
  border-top: 1.5px solid var(--ink);
  border-collapse: collapse;
}
.total-lbl {
  display: table-cell; width: 52%;
  padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--ink);
  text-align: center; vertical-align: middle;
}
.total-spacer { display: table-cell; width: 27%; }
.total-val {
  display: table-cell; width: 21%;
  padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--ink);
  text-align: center; vertical-align: middle;
}

/* terms — 上下各留 72px */
.d-terms { margin: 72px 100px; padding: 14px 18px; background: #f8fafa; border-radius: 6px; }
.terms-h { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--teal-d); margin-bottom: 7px; }
.terms-b { font-size: 10px; color: #555; line-height: 1.6; white-space: pre-line; }

/* signature */
.d-sig { padding: 0 100px 40px; }
.sig-labels {
  display: flex; gap: 48px;
  font-size: 12px; color: #aaa; margin-bottom: 60px;
}
.sig-labels span { flex: 1; text-align: left; }
.sig-lines {
  display: flex; justify-content: space-between; gap: 48px; align-items: flex-end;
}
.sig-line-block { flex: 1; }
.sig-name { font-size: 52px; color: var(--ink); text-align: left; margin-bottom: 4px; line-height: 1.2; }
.sig-line { border-top: 1px solid #ccc; }

/* footer */
.d-foot {
  border-top: 1px solid var(--line);
  padding: 10px 100px;
  display: flex; align-items: center; justify-content: space-between;
}
.d-foot-logo { height: 18px; width: auto; opacity: .45; }
.d-foot-text { font-size: 10px; color: #bbb; letter-spacing: 1px; }

/* ── print ── */
@media print {
  @page { size: A4; margin: 0; }
  body { background: #fff; }
  .side { display: none !important; }
  .stage { padding: 0; display: block; overflow: visible; }
  .wrap { display: block; height: auto; overflow: visible; }
  .doc { max-width: 100%; box-shadow: none; }
}
</style>
</head>

let compactMode = false;
function toggleCompact(){
  compactMode = !compactMode;
  const btn = document.getElementById("compactBtn");
  btn.textContent = compactMode ? "☰ 緊湊模式：開" : "☰ 緊湊模式：關";
  btn.classList.toggle("on", compactMode);
  render();
}

let rows = [
  { desc: "【MIFFY】粉色月亮-大小盤組(2入組)", price: 17.95, qty: 12 },
  { desc: "運費（順豐）", price: 45.00, qty: 1 },
];

(function init(){
  const t = new Date();
  document.getElementById("qdate").value = t.toISOString().slice(0,10);
  document.getElementById("qno").value =
    t.getFullYear() + String(t.getMonth()+1).padStart(2,"0") + String(t.getDate()).padStart(2,"0") + "-01";
  renderAll();
})();

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fdate(s){
  if(!s) return "";
  const d = new Date(s+"T00:00:00");
  return d.getDate()+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]+" "+d.getFullYear();
}
function cur(){ return document.getElementById("cur").value; }

function renderTable(){
  document.getElementById("tbody").innerHTML = rows.map((r,i) => `<tr>
    <td class="c-d"><input value="${esc(r.desc)}" placeholder="品名說明" oninput="rows[${i}].desc=this.value;render()"></td>
    <td class="c-p"><input type="number" step=".01" min="0" value="${r.price}" style="text-align:right" oninput="rows[${i}].price=parseFloat(this.value)||0;render()"></td>
    <td class="c-q"><input type="number" step="1" min="0" value="${r.qty}" style="text-align:right" oninput="rows[${i}].qty=parseFloat(this.value)||0;render()"></td>
    <td class="c-x"><button class="x-btn" onclick="rows.splice(${i},1);renderAll()">×</button></td>
  </tr>`).join("");
}

function addRow(){ rows.push({desc:"",price:0,qty:1}); renderAll(); }
function renderAll(){ renderTable(); render(); }

function render(){
  const c   = cur();
  const no  = document.getElementById("qno").value;
  const dt  = document.getElementById("qdate").value;
  const cn  = document.getElementById("cname").value;
  const ca  = document.getElementById("caddr").value;
  const cc  = document.getElementById("ccont").value;
  const trm = document.getElementById("terms").value;
  const sig = document.getElementById("signer").value;
  const sigFont = document.getElementById("sigFont").value;
  const sigWeight = sigFont.includes("Kalam") ? "300" : "700";
  const sigStyle = "font-family:" + sigFont + ";font-weight:" + sigWeight;
  // 更新預覽
  const prev = document.getElementById("fontPreview");
  if (prev) { prev.style.fontFamily = sigFont; prev.style.fontWeight = sigWeight; prev.textContent = sig || "Sarah"; }
  const grand = rows.reduce((s,r)=>s+r.price*r.qty,0).toFixed(2);

  const trows = rows.map((r,i) => `<tr>
    <td>${i+1}. ${esc(r.desc)}</td>
    <td class="r">${r.price>0 ? r.price.toFixed(2) : "—"}</td>
    <td class="r">${r.qty!==1 ? r.qty : ""}</td>
    <td class="r bold">${c}${(r.price*r.qty).toFixed(2)}</td>
  </tr>`).join("");

  document.getElementById("out").innerHTML = `
  <div class="doc ${compactMode ? 'compact' : ''}">
    <div class="d-top">
      <div class="d-logo-block">
        <img class="d-logo" src="${LOGO}" alt="iam">
        <div class="d-co-name">iam Creative Industries Co., Ltd.</div>
      </div>
    </div>

    <div class="d-title-row">
      <div class="d-word">Quotation</div>
    </div>

    <div class="d-meta-row">
      <div>
        <div class="d-cname">${cn ? esc(cn) : '<span style="color:#ccc">客戶名稱</span>'}</div>
        <div class="d-cinfo">${[ca,cc].filter(Boolean).map(esc).join("<br>")}</div>
      </div>
      <div class="d-nodate">
        <span class="lbl">No. : &nbsp;</span>${esc(no)||"—"}<br>
        <span class="lbl">Date : &nbsp;</span>${fdate(dt)||"—"}
      </div>
    </div>


    <div class="d-tbl-wrap">
      <table class="d-tbl">
        <thead><tr>
          <th style="width:52%">Description</th>
          <th class="r" style="width:17%">Unit Price</th>
          <th class="r" style="width:10%">Q'ty</th>
          <th class="r" style="width:21%">Amount</th>
        </tr></thead>
        <tbody>${trows}</tbody>
      </table>
    </div>

    <div class="d-total">
      <div class="total-inner">
        <span class="total-lbl">Grand Total</span>
        <span class="total-spacer"></span>
        <span class="total-val">${c}${grand}</span>
      </div>
    </div>

    ${trm ? `
    <div class="d-terms">
      <div class="terms-h">Term</div>
      <div class="terms-b">${esc(trm)}</div>
    </div>` : ""}

    <div class="d-sig">
      <div class="sig-labels">
        <span>客戶確認</span>
        <span>我適文創</span>
      </div>
      <div class="sig-lines">
        <div class="sig-line-block">
          <div class="sig-line"></div>
        </div>
        <div class="sig-line-block">
          ${sig ? '<div class="sig-name" style="' + sigStyle + '">' + esc(sig) + '</div>' : ""}
          <div class="sig-line"></div>
        </div>
      </div>
    </div>

  </div>`;
}
</script>
